name: Issue and PR Lifecycle Automation

on:
  issues:
    types: [opened, edited, closed, reopened]
  pull_request_target:
    types: [opened, edited, closed, reopened]

# Prevent parallel runs on the same issue/PR to avoid label add/remove races
concurrency:
  group: lifecycle-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  automate-lifecycle:
    name: Automate Labels and Assignments
    runs-on: ubuntu-latest
    # Allow closed events from any actor (we want to label merged PRs), but
    # skip open/edit/reopen when triggered by bot auto-merge push-back events
    if: github.event.action == 'closed' || (github.actor != 'github-actions[bot]' && github.actor != 'dependabot[bot]')
    steps:
      - name: Process Lifecycle Event
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const eventName = context.eventName;
            const action = context.payload.action;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            let item;
            let isPR = false;
            let issueNumber;
            let itemUrl;

            if (eventName === 'pull_request' || eventName === 'pull_request_target') {
              item = context.payload.pull_request;
              isPR = true;
              issueNumber = item.number;
            } else if (eventName === 'issues') {
              item = context.payload.issue;
              issueNumber = item.number;
            }

            if (!item) {
              console.log('No issue or pull request payload found.');
              return;
            }

            console.log(`Processing ${isPR ? 'PR' : 'Issue'} #${issueNumber} on action: ${action}`);

            const currentLabels = item.labels.map(l => l.name);
            const currentAssignees = item.assignees.map(a => a.login);
            const itemAuthor = item.user.login;
            const authorType = item.user.type;

            // Helper to add labels
            const addLabels = async (labelsToAdd) => {
              const missing = labelsToAdd.filter(l => !currentLabels.includes(l));
              if (missing.length > 0) {
                await github.rest.issues.addLabels({
                  owner, repo, issue_number: issueNumber, labels: missing
                });
                console.log(`Added labels: ${missing}`);
              }
            };

            // Helper to remove labels
            const removeLabels = async (labelsToRemove) => {
              for (const label of labelsToRemove) {
                if (currentLabels.includes(label)) {
                  try {
                    await github.rest.issues.removeLabel({
                      owner, repo, issue_number: issueNumber, name: label
                    });
                    console.log(`Removed label: ${label}`);
                  } catch (e) {
                    console.log(`Warning: Failed to remove label ${label}: ${e.message}`);
                  }
                }
              }
            };

            // Helper to assign users
            const assignUsers = async (usersToAssign) => {
              const missing = usersToAssign.filter(u => !currentAssignees.includes(u));
              if (missing.length > 0) {
                await github.rest.issues.addAssignees({
                  owner, repo, issue_number: issueNumber, assignees: missing
                });
                console.log(`Assigned users: ${missing}`);
              }
            };

            // Helper to add comment
            const addComment = async (body) => {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber, body
              });
              console.log('Comment posted.');
            };

            // ==========================================
            // 1. CLOSED lifecycle state
            // ==========================================
            if (action === 'closed') {
              if (isPR) {
                const isMerged = item.merged || false;
                if (isMerged) {
                  // Use setLabels for atomic replacement: removes gssoc:invalid,
                  // adds accepted/integrated/GSSoC-26/gssoc:approved in one call.
                  // Fetch current labels so we don't nuke labels from other workflows.
                  const { data: freshIssue } = await github.rest.issues.get({
                    owner, repo, issue_number: issueNumber
                  });
                  const existingLabels = freshIssue.labels.map(l => l.name);
                  const keepLabels = existingLabels.filter(l =>
                    l !== 'gssoc:invalid'
                  );
                  const desiredAdditions = ['accepted', 'integrated'];
                  const finalLabels = [...new Set([...keepLabels, ...desiredAdditions])];
                  await github.rest.issues.setLabels({
                    owner, repo, issue_number: issueNumber,
                    labels: finalLabels
                  });
                  console.log(`Atomic label update: set ${finalLabels.length} labels on merged PR #${issueNumber}.`);
                  await addComment(`🎉 **Pull Request Integrated!**\n\nThank you for your contribution, @${itemAuthor}! Your changes have been successfully merged into \`main\` and will be credited to your wall. 🚀`);
                } else {
                  await removeLabels(['accepted', 'integrated']);
                  await addLabels(['gssoc:invalid']);
                  console.log(`PR #${issueNumber} was closed without merge. Marked invalid.`);
                }
              } else {
                // Issue closed: atomic set to replace gssoc:invalid with accepted
                const { data: freshIssue } = await github.rest.issues.get({
                  owner, repo, issue_number: issueNumber
                });
                const existingLabels = freshIssue.labels.map(l => l.name);
                const keepLabels = existingLabels.filter(l =>
                  l !== 'gssoc:invalid'
                );
                const finalLabels = [...new Set([...keepLabels, 'accepted'])];
                await github.rest.issues.setLabels({
                  owner, repo, issue_number: issueNumber,
                  labels: finalLabels
                });
                console.log(`Atomic label update: set ${finalLabels.length} labels on closed issue #${issueNumber}.`);
                await addComment(`🔒 **Issue Resolved & Closed.**\n\nThis issue has been marked as **accepted** and successfully resolved. Thanks for participating! ✨`);
              }
            }

            // ==========================================
            // 2. REOPENED lifecycle state
            // ==========================================
            if (action === 'reopened') {
              await removeLabels(['accepted', 'integrated', 'gssoc:invalid']);
            }

            // ==========================================
            // 3. OPENED / REOPENED / EDITED dynamic tagging and assignment
            // ==========================================
            if (action === 'opened' || action === 'reopened' || action === 'edited') {
              // Only remove accepted/integrated if it is opened or reopened
              if (action === 'opened' || action === 'reopened') {
                await removeLabels(['accepted', 'integrated', 'gssoc:invalid']);
              }

              // Dynamic label matrix calculations
              const title = item.title || '';
              const body = item.body || '';
              const textContent = `${title} ${body}`.toLowerCase();

              // Base GSSoC labels are only added on open/reopen, not on edit.
              // This prevents redundant API calls when a user edits their title/body
              // or when bot push-back triggers a synchronize+edit cascade.
              const computedLabels = [];
              if (action !== 'edited') {
                computedLabels.push('GSSoC-26', 'gssoc:approved');
              }

              if (textContent.includes('animation') || textContent.includes('animate')) {
                computedLabels.push('animation');
              } else if (textContent.includes('component') || textContent.includes('element')) {
                computedLabels.push('component');
              }

              if (textContent.includes('feature') || textContent.includes('add')) {
                computedLabels.push('type:feature');
              } else if (textContent.includes('enhance') || textContent.includes('optimize')) {
                computedLabels.push('enhancement');
              }

              if (textContent.includes('good first') || textContent.includes('easy')) {
                computedLabels.push('good first issue');
              } else {
                computedLabels.push('level:intermediate');
              }

              await addLabels(computedLabels);

              // Assign participants
              if (action === 'opened' || action === 'reopened') {
                if (isPR) {
                  // PR: Assign author (if User) and Repo Owner (SAPTARSHI-coder)
                  const targets = [owner];
                  if (authorType === 'User') {
                    targets.push(itemAuthor);
                  }
                  await assignUsers(targets);
                } else {
                  // Issue: Auto-assign author on open (if User)
                  if (authorType === 'User') {
                    await assignUsers([itemAuthor]);
                  }
                }
              }
            }
