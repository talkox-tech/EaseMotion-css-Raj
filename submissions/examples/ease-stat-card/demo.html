<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ease Stat Card Demo</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">

    <header>
      <h1>Ease Stat Card</h1>
      <p>
        A responsive metric card component with icons,
        count-up animation, and dashboard-ready layouts.
      </p>
    </header>

    <section class="stats-grid">

      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <h2 class="stat-number" data-target="12500">0</h2>
        <p class="stat-label">Total Users</p>
      </div>

      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <h2 class="stat-number" data-target="89200">0</h2>
        <p class="stat-label">Revenue</p>
      </div>

      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <h2 class="stat-number" data-target="1845">0</h2>
        <p class="stat-label">Orders</p>
      </div>

      <div class="stat-card">
        <div class="stat-icon">📈</div>
        <h2 class="stat-number percent" data-target="78">0</h2>
        <p class="stat-label">Conversion Rate</p>
      </div>

    </section>

    <section class="usage">
      <h2>Usage Example</h2>

      <pre>
<div class="ease-stat-card">
    <div class="icon">📈</div>
    <h2>12,500</h2>
    <p>Total Users</p>
</div>
            </pre>
    </section>

  </div>

  <script>
    const counters =
      document.querySelectorAll(".stat-number");

    counters.forEach(counter => {

      const target =
        Number(counter.dataset.target);

      let current = 0;

      const increment =
        Math.ceil(target / 100);

      const updateCounter = () => {

        current += increment;

        if (current > target) {
          current = target;
        }

        if (
          counter.classList.contains("percent")
        ) {
          counter.textContent =
            current + "%";
        } else {
          counter.textContent =
            current.toLocaleString();
        }

        if (current < target) {
          requestAnimationFrame(updateCounter);
        }
      };

      updateCounter();
    });
  </script>

</body>

</html>
