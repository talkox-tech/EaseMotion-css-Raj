<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glassmorphism Pricing – EaseMotion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="pricing-section">
  <h1 class="pricing-title">Choose Your Plan</h1>

  <label class="billing-toggle">
    <span class="toggle-label" id="monthlyLabel">Monthly</span>
    <input type="checkbox" id="billingSwitch" onchange="toggleBilling()">
    <span class="toggle-track"><span class="toggle-thumb"></span></span>
    <span class="toggle-label" id="annualLabel">Annual <span class="toggle-badge">Save 20%</span></span>
  </label>

  <div class="pricing-grid">
    <div class="pricing-card" data-tilt>
      <div class="card-glow"></div>
      <h2 class="plan-name">Starter</h2>
      <div class="price">
        <span class="price-monthly">$19</span>
        <span class="price-annual" style="display:none">$15</span>
        <span class="price-period">/mo</span>
      </div>
      <ul class="features">
        <li>10 projects</li>
        <li>5 GB storage</li>
        <li>Basic analytics</li>
        <li>Email support</li>
      </ul>
      <button class="plan-btn">Get Started</button>
    </div>

    <div class="pricing-card featured" data-tilt>
      <div class="card-glow"></div>
      <span class="badge">Popular</span>
      <h2 class="plan-name">Pro</h2>
      <div class="price">
        <span class="price-monthly">$49</span>
        <span class="price-annual" style="display:none">$39</span>
        <span class="price-period">/mo</span>
      </div>
      <ul class="features">
        <li>Unlimited projects</li>
        <li>50 GB storage</li>
        <li>Advanced analytics</li>
        <li>Priority support</li>
        <li>Custom integrations</li>
      </ul>
      <button class="plan-btn">Get Started</button>
    </div>
  </div>
</div>

<script>
function toggleBilling() {
  const isAnnual = document.getElementById('billingSwitch').checked;
  document.querySelectorAll('.price-monthly').forEach(el => el.style.display = isAnnual ? 'none' : '');
  document.querySelectorAll('.price-annual').forEach(el => el.style.display = isAnnual ? '' : 'none');
}

document.querySelectorAll('[data-tilt]').forEach(card => {
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const centerX = rect.width / 2;
    const centerY = rect.height / 2;
    const rotateX = (y - centerY) / centerY * -8;
    const rotateY = (x - centerX) / centerX * 8;
    card.style.setProperty('--rx', rotateX + 'deg');
    card.style.setProperty('--ry', rotateY + 'deg');
  });
  card.addEventListener('mouseleave', () => {
    card.style.setProperty('--rx', '0deg');
    card.style.setProperty('--ry', '0deg');
  });
});
</script>
</body>
</html>
