<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ease-fade-out — EaseMotion CSS</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      background: #0f0e17;
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 3rem 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    .subtitle { color: rgba(255,255,255,0.5); margin-bottom: 2.5rem; }
    .demo-grid { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .demo-col { display: flex; flex-direction: column; align-items: flex-start; gap: 0.75rem; }
    .demo-col p { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin: 0; }
    .toast {
      padding: 0.75rem 1.25rem;
      background: rgba(108,99,255,0.2);
      border: 1px solid rgba(108,99,255,0.4);
      border-radius: 0.5rem;
      font-size: 0.9rem;
      min-width: 200px;
    }
    .btn {
      padding: 0.5rem 1.25rem;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 0.875rem;
      font-weight: 600;
    }
    .btn:hover { background: #5a52d5; }
  </style>
</head>
<body>
  <h1>ease-fade-out</h1>
  <p class="subtitle">Exit animation — fade from opacity 1 to 0 — Issue #243</p>

  <div class="demo-grid">
    <div class="demo-col">
      <p>Default speed (300ms)</p>
      <div class="toast" id="toast1">🔔 Notification dismissed</div>
      <button class="btn" onclick="triggerFade('toast1','ease-fade-out',this)">Dismiss</button>
    </div>
    <div class="demo-col">
      <p>Fast (150ms)</p>
      <div class="toast" id="toast2">⚡ Quick fade out</div>
      <button class="btn" onclick="triggerFade('toast2','ease-fade-out ease-fade-out--fast',this)">Dismiss</button>
    </div>
    <div class="demo-col">
      <p>Slow (600ms)</p>
      <div class="toast" id="toast3">🌙 Slow fade out</div>
      <button class="btn" onclick="triggerFade('toast3','ease-fade-out ease-fade-out--slow',this)">Dismiss</button>
    </div>
  </div>

  <script>
    function triggerFade(id, cls, btn) {
      const el = document.getElementById(id);
      el.className = 'toast ' + cls;
      btn.disabled = true;
      setTimeout(() => {
        el.className = 'toast';
        el.style.opacity = '';
        btn.disabled = false;
      }, 900);
    }
  </script>
</body>
</html>
