<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Category Dropdown Theme Fix - EaseMotion CSS</title>
  
  <!-- Link to EaseMotion CSS core -->
  <link rel="stylesheet" href="../../../core/animations.css">
  <!-- Link to your CSS file - do not change this path -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="demo-container">
    <div class="theme-switch-wrapper">
      <button id="themeToggle" class="theme-btn" aria-label="Toggle light/dark theme">
        <span class="theme-btn-text">Light Mode</span>
      </button>
    </div>

    <h1 class="demo-title">Category Dropdown</h1>
    <p class="demo-description">
      An elegant, theme-adaptive category select dropdown. It ensures option lists are fully styled and legible (preventing white-on-white text issues in Chromium browsers) under both dark and light modes.
    </p>

    <div class="category-dropdown-container">
      <label for="categorySelect" class="category-dropdown-label">Filter animations</label>
      <select id="categorySelect" class="category-dropdown">
        <option value="all">All Categories</option>
        <option value="fades">Fades</option>
        <option value="slides">Slides</option>
        <option value="zooms">Zooms</option>
